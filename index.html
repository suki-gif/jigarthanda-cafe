<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Jigarthanda Cafe</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        body {
            background: #fef8f0;
            color: #2d3436;
            padding-bottom: 80px;
        }
        header {
            background: white;
            padding: 12px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 20px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .logo {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .cart-icon {
            background: #ff6b35;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .cart-count {
            background: white;
            color: #ff6b35;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }
        .menu-container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 16px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }
        .drink-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: transform 0.2s;
        }
        .drink-card:hover {
            transform: translateY(-5px);
        }
        .drink-img {
            height: 160px;
            background: #ffe8d6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
        }
        .drink-info {
            padding: 16px;
        }
        .drink-name {
            font-size: 18px;
            font-weight: 700;
        }
        .drink-category {
            font-size: 12px;
            color: #ff6b35;
            text-transform: uppercase;
            font-weight: 600;
        }
        .drink-desc {
            font-size: 13px;
            color: #636e72;
            margin: 8px 0;
        }
        .price {
            font-size: 20px;
            font-weight: 800;
            color: #ff6b35;
        }
        .add-btn {
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
        }
        .cart-panel {
            position: fixed;
            right: 0;
            top: 0;
            width: 350px;
            max-width: 90%;
            height: 100%;
            background: white;
            box-shadow: -5px 0 30px rgba(0,0,0,0.2);
            z-index: 1000;
            padding: 20px;
            transform: translateX(100%);
            transition: transform 0.3s;
            overflow-y: auto;
        }
        .cart-panel.open {
            transform: translateX(0);
        }
        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #eee;
        }
        .checkout-btn {
            background: #00b894;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 30px;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
        }
        .overlay.show {
            display: block;
        }
        .qr-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 24px;
            border-radius: 24px;
            text-align: center;
            z-index: 1001;
            width: 300px;
            display: none;
        }
        .qr-modal.show {
            display: block;
        }
        footer {
            text-align: center;
            padding: 20px;
            color: #b2bec3;
            font-size: 12px;
        }
        @media (max-width: 600px) {
            .menu-container {
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }
            .drink-name {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">🍹 Jigarthanda Cafe</div>
        <button class="cart-icon" onclick="toggleCart()">🛒 Cart <span class="cart-count" id="cartCount">0</span></button>
    </header>

    <div class="menu-container" id="menuContainer">
        <div style="grid-column:1/-1; text-align:center; padding:40px;">Loading menu...</div>
    </div>

    <div class="overlay" id="overlay" onclick="closeCart()"></div>
    <div class="cart-panel" id="cartPanel">
        <div class="cart-header">
            <h3>Your Order</h3>
            <button onclick="closeCart()" style="background:none; border:none; font-size:24px; cursor:pointer;">&times;</button>
        </div>
        <div id="cartItems"></div>
        <div id="cartTotal" style="font-size:20px; font-weight:800; margin-top:16px;"></div>
        <button class="checkout-btn" onclick="checkout()">Proceed to Payment</button>
    </div>

    <div class="qr-modal" id="qrModal">
        <h3>Scan to Pay</h3>
        <div style="font-size:80px; margin:16px 0;">📱</div>
        <p>Touch 'n Go / DuitNow</p>
        <p style="font-size:12px; color:gray;">Order total: RM <span id="qrTotal">0</span></p>
        <button onclick="confirmOrder()" style="background:#ff6b35; color:white; border:none; padding:10px 20px; border-radius:30px; margin-top:12px; cursor:pointer;">I have paid</button>
        <button onclick="closeQR()" style="background:none; border:none; margin-top:8px; cursor:pointer;">Cancel</button>
    </div>

    <footer>
        © 2025 Jigarthanda Cafe | Freshly made daily
    </footer>

    <script>
        // === YOUR GOOGLE SHEETS CSV LINK ===
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQT8-gOnu5hF7wNG7VOqLj4Q6OVuLFLe00Jq8umCqWaWlpjHctcDDgeB6O7LCUu9cTwVmNhbxxDNRfp/pub?output=csv";

        let menu = [];
        let cart = [];

        // Fetch and parse CSV
        async function loadMenu() {
            try {
                const response = await fetch(CSV_URL);
                const csvText = await response.text();
                const rows = csvText.trim().split("\n");
                const headers = rows[0].split(",");
                for (let i = 1; i < rows.length; i++) {
                    const cols = rows[i].split(",");
                    if (cols.length < 4) continue;
                    const item = {
                        id: cols[0],
                        name: cols[1],
                        price: parseFloat(cols[2]),
                        category: cols[3],
                        description: cols[4] || "",
                        image: cols[5] || "🥤"
                    };
                    menu.push(item);
                }
                renderMenu();
            } catch (error) {
                document.getElementById("menuContainer").innerHTML = "<div style='grid-column:1/-1; text-align:center; padding:40px; color:red;'>Failed to load menu. Please check connection.</div>";
                console.error(error);
            }
        }

        function renderMenu() {
            const container = document.getElementById("menuContainer");
            if (menu.length === 0) {
                container.innerHTML = "<div style='grid-column:1/-1; text-align:center; padding:40px;'>No drinks found. Add some to your Google Sheet.</div>";
                return;
            }
            container.innerHTML = menu.map(drink => `
                <div class="drink-card">
                    <div class="drink-img">${drink.image}</div>
                    <div class="drink-info">
                        <div class="drink-category">${drink.category}</div>
                        <div class="drink-name">${drink.name}</div>
                        <div class="drink-desc">${drink.description}</div>
                        <div class="price">RM ${drink.price.toFixed(2)}</div>
                        <button class="add-btn" onclick="addToCart(${drink.id})">Add to Cart</button>
                    </div>
                </div>
            `).join("");
        }

        function addToCart(id) {
            const drink = menu.find(d => d.id == id);
            if (!drink) return;
            const existing = cart.find(i => i.id == id);
            if (existing) {
                existing.qty++;
            } else {
                cart.push({ ...drink, qty: 1 });
            }
            updateCartUI();
            showToast("Added: " + drink.name);
        }

        function updateCartUI() {
            const cartItemsDiv = document.getElementById("cartItems");
            const cartCountSpan = document.getElementById("cartCount");
            const totalQty = cart.reduce((sum, i) => sum + i.qty, 0);
            cartCountSpan.innerText = totalQty;
            if (cart.length === 0) {
                cartItemsDiv.innerHTML = "<p style='text-align:center; color:gray;'>Cart is empty</p>";
                document.getElementById("cartTotal").innerHTML = "";
                return;
            }
            cartItemsDiv.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <div><strong>${item.name}</strong><br>RM ${item.price.toFixed(2)}</div>
                    <div>
                        <button onclick="changeQty(${item.id}, -1)" style="background:#eee; border:none; width:28px; border-radius:8px;">-</button>
                        <span style="margin:0 8px;">${item.qty}</span>
                        <button onclick="changeQty(${item.id}, 1)" style="background:#eee; border:none; width:28px; border-radius:8px;">+</button>
                        <button onclick="removeItem(${item.id})" style="background:none; border:none; margin-left:8px; color:red;">🗑️</button>
                    </div>
                </div>
            `).join("");
            const total = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);
            document.getElementById("cartTotal").innerHTML = `Total: RM ${total.toFixed(2)}`;
        }

        function changeQty(id, delta) {
            const idx = cart.findIndex(i => i.id == id);
            if (idx === -1) return;
            const newQty = cart[idx].qty + delta;
            if (newQty <= 0) {
                cart.splice(idx, 1);
            } else {
                cart[idx].qty = newQty;
            }
            updateCartUI();
        }

        function removeItem(id) {
            cart = cart.filter(i => i.id != id);
            updateCartUI();
        }

        let pendingTotal = 0;
        function checkout() {
            if (cart.length === 0) {
                alert("Your cart is empty.");
                return;
            }
            const total = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);
            pendingTotal = total;
            document.getElementById("qrTotal").innerText = total.toFixed(2);
            document.getElementById("qrModal").classList.add("show");
            document.getElementById("overlay").classList.add("show");
            closeCart(); // close cart panel
        }

        function confirmOrder() {
            if (cart.length === 0) return;
            // Save order to localStorage (simple order history)
            const order = {
                id: Date.now(),
                items: [...cart],
                total: pendingTotal,
                status: "Pending",
                time: new Date().toLocaleString()
            };
            let orders = JSON.parse(localStorage.getItem("orders") || "[]");
            orders.unshift(order);
            localStorage.setItem("orders", orders);
            // Clear cart
            cart = [];
            updateCartUI();
            closeQR();
            showToast("Order placed! Thank you.");
            // Optional: you can show a receipt summary
        }

        function closeQR() {
            document.getElementById("qrModal").classList.remove("show");
            document.getElementById("overlay").classList.remove("show");
        }

        function toggleCart() {
            document.getElementById("cartPanel").classList.toggle("open");
            document.getElementById("overlay").classList.toggle("show");
        }
        function closeCart() {
            document.getElementById("cartPanel").classList.remove("open");
            document.getElementById("overlay").classList.remove("show");
        }

        function showToast(msg) {
            let toast = document.createElement("div");
            toast.innerText = msg;
            toast.style.position = "fixed";
            toast.style.bottom = "20px";
            toast.style.left = "50%";
            toast.style.transform = "translateX(-50%)";
            toast.style.background = "#2d3436";
            toast.style.color = "white";
            toast.style.padding = "10px 20px";
            toast.style.borderRadius = "30px";
            toast.style.zIndex = "9999";
            toast.style.fontSize = "14px";
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        // Load menu when page loads
        loadMenu();
    </script>
</body>
</html>
