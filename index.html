<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Jigarthanda Cafe</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
        body{background:#F1D8B8;color:#2c2c2c;padding-bottom:80px;}
        header{background:#3E1613;padding:12px 20px;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;}
        .logo{display:flex;align-items:center;gap:12px;font-size:22px;font-weight:800;color:#fff;}
        .logo img{height:45px;width:auto;border-radius:12px;background:white;padding:4px;object-fit:contain;}
        .cart-icon{background:#fff;border:none;padding:8px 18px;border-radius:40px;font-weight:700;cursor:pointer;display:flex;gap:8px;color:#2c2c2c;}
        .cart-count{background:#D38C3A;color:#fff;border-radius:50%;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-size:12px;}
        .menu-container{max-width:1200px;margin:30px auto;padding:0 16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px;}
        .drink-card{background:rgba(255,255,255,0.6);border-radius:28px;overflow:hidden;backdrop-filter:blur(4px);box-shadow:0 8px 24px rgba(0,0,0,0.08);transition:transform 0.25s;}
        .drink-card:hover{transform:translateY(-6px);}
        .drink-img{height:160px;background:rgba(255,255,255,0.4);display:flex;align-items:center;justify-content:center;font-size:64px;}
        .drink-info{padding:18px;}
        .drink-name{font-size:20px;font-weight:800;color:#2c2c2c;margin-bottom:6px;}
        .drink-category{font-size:12px;color:#7C3F20;text-transform:uppercase;font-weight:700;letter-spacing:1px;}
        .drink-desc{font-size:13px;color:#5a3e2e;margin:8px 0;}
        .price{font-size:22px;font-weight:800;color:#B56A2B;}
        .add-btn{background:#D38C3A;border:none;color:#fff;padding:10px 18px;border-radius:40px;font-weight:700;cursor:pointer;width:100%;margin-top:14px;transition:background 0.2s;}
        .add-btn:hover{background:#b8772a;}
        .cart-panel{position:fixed;right:0;top:0;width:360px;max-width:90%;height:100%;background:white;box-shadow:-8px 0 30px rgba(0,0,0,0.15);z-index:1000;padding:24px 20px;transform:translateX(100%);transition:transform 0.3s;overflow-y:auto;}
        .cart-panel.open{transform:translateX(0);}
        .cart-header{display:flex;justify-content:space-between;margin-bottom:20px;border-bottom:2px solid #F1D8B8;}
        .cart-item{display:flex;justify-content:space-between;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #f5e0c8;}
        .checkout-btn{background:#3E1613;color:#fff;border:none;padding:14px;width:100%;border-radius:50px;font-weight:bold;margin-top:20px;cursor:pointer;transition:background 0.2s;}
        .checkout-btn:hover{background:#2a0f0d;}
        .overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:999;display:none;}
        .overlay.show{display:block;}
        .qr-modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;padding:28px;border-radius:32px;text-align:center;z-index:1001;width:300px;display:none;}
        .qr-modal.show{display:block;}
        footer{text-align:center;padding:24px;color:#fff;background:#7C3F20;margin-top:40px;}
        @media(max-width:600px){.menu-container{grid-template-columns:1fr 1fr;gap:14px;}}
    </style>
</head>
<body>
<header>
    <div class="logo"><img src="logo.png" alt="Logo"> Jigarthanda Cafe</div>
    <button class="cart-icon" onclick="toggleCart()">🛒 Cart <span class="cart-count" id="cartCount">0</span></button>
</header>
<div class="menu-container" id="menuContainer">Loading menu...</div>
<div class="overlay" id="overlay" onclick="closeCart()"></div>
<div class="cart-panel" id="cartPanel">
    <div class="cart-header"><h3>Your Order</h3><button onclick="closeCart()">&times;</button></div>
    <div id="cartItems"></div><div id="cartTotal"></div>
    <button class="checkout-btn" onclick="checkout()">Proceed to Payment</button>
</div>
<div class="qr-modal" id="qrModal">
    <h3>Scan to Pay</h3><div style="font-size:80px;">📱</div><p>Touch 'n Go / DuitNow</p>
    <p>Total: RM <span id="qrTotal">0</span></p>
    <button onclick="confirmOrder()">I have paid</button>
    <button onclick="closeQR()">Cancel</button>
</div>
<footer>✨ Chocolate Ganache · Belgian Waffle · Honeycomb · Vanilla Foam · Maple Syrup ✨<br>Jigarthanda Cafe — Since 2000</footer>
<script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQT8-gOnu5hF7wNG7VOqLj4Q6OVuLFLe00Jq8umCqWaWlpjHctcDDgeB6O7LCUu9cTwVmNhbxxDNRfp/pub?output=csv";
    let menu = [], cart = [];
    async function loadMenu() {
        try {
            const res = await fetch(CSV_URL);
            const txt = await res.text();
            const rows = txt.trim().split("\n");
            for(let i=1;i<rows.length;i++) {
                const cols = rows[i].split(",");
                if(cols.length<4) continue;
                menu.push({id:cols[0], name:cols[1], price:parseFloat(cols[2]), category:cols[3], description:cols[4]||"", image:cols[5]||"🥤"});
            }
            renderMenu();
        } catch(e) { document.getElementById("menuContainer").innerHTML = "Failed to load menu"; }
    }
    function renderMenu() {
        const cont = document.getElementById("menuContainer");
        if(!menu.length) { cont.innerHTML = "No drinks"; return; }
        cont.innerHTML = menu.map(d => `<div class="drink-card"><div class="drink-img">${d.image}</div><div class="drink-info"><div class="drink-category">${d.category}</div><div class="drink-name">${d.name}</div><div class="drink-desc">${d.description}</div><div class="price">RM ${d.price.toFixed(2)}</div><button class="add-btn" onclick="addToCart(${d.id})">Add to Cart</button></div></div>`).join("");
    }
    function addToCart(id) {
        const drink = menu.find(d=>d.id==id);
        if(!drink) return;
        let exist = cart.find(i=>i.id==id);
        if(exist) exist.qty++;
        else cart.push({...drink,qty:1});
        updateUI();
    }
    function updateUI() {
        const cartDiv = document.getElementById("cartItems");
        const countSpan = document.getElementById("cartCount");
        const totalQty = cart.reduce((s,i)=>s+i.qty,0);
        countSpan.innerText = totalQty;
        if(!cart.length) { cartDiv.innerHTML = "<p>Cart empty</p>"; document.getElementById("cartTotal").innerHTML = ""; return; }
        cartDiv.innerHTML = cart.map(i => `<div class="cart-item"><div><strong>${i.name}</strong><br>RM ${i.price.toFixed(2)}</div><div><button onclick="chg(${i.id},-1)">-</button>${i.qty}<button onclick="chg(${i.id},1)">+</button><button onclick="rem(${i.id})">🗑️</button></div></div>`).join("");
        const total = cart.reduce((s,i)=>s+i.price*i.qty,0);
        document.getElementById("cartTotal").innerHTML = `Total: RM ${total.toFixed(2)}`;
    }
    function chg(id,delta) { let idx = cart.findIndex(i=>i.id==id); if(idx===-1) return; let n = cart[idx].qty+delta; if(n<=0) cart.splice(idx,1); else cart[idx].qty=n; updateUI(); }
    function rem(id) { cart = cart.filter(i=>i.id!=id); updateUI(); }
    let pend=0;
    function checkout() { if(!cart.length) return alert("Cart empty"); pend = cart.reduce((s,i)=>s+i.price*i.qty,0); document.getElementById("qrTotal").innerText = pend.toFixed(2); document.getElementById("qrModal").classList.add("show"); document.getElementById("overlay").classList.add("show"); closeCart(); }
    function confirmOrder() { cart = []; updateUI(); closeQR(); alert("Order placed! 💖"); }
    function closeQR() { document.getElementById("qrModal").classList.remove("show"); document.getElementById("overlay").classList.remove("show"); }
    function toggleCart() { document.getElementById("cartPanel").classList.toggle("open"); document.getElementById("overlay").classList.toggle("show"); }
    function closeCart() { document.getElementById("cartPanel").classList.remove("open"); document.getElementById("overlay").classList.remove("show"); }
    loadMenu();
</script>
</body>
</html>
